<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Магазин учебных товаров{% endblock %}</title>
    
    <!-- Подключение Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Убираем лишний верхний отступ у body, чтобы шапка прилегала к верху */
        body { padding-top: 0; }
        
        /* Стилизуем кнопку корзины, чтобы текст оставался читаемым при наведении */
        .btn-outline-light:hover {
            color: #212529 !important; /* Текст становится темным при наведении на белую кнопку */
        }
        
        .footer { margin-top: 50px; padding: 20px 0; border-top: 1px solid #e7e7e7; }
    </style>
</head>
<body class="bg-light">

    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'product_list' %}">Shop2026</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'product_list' %}">Каталог</a>
                    </li>
                </ul>
                
                <div class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <span class="nav-link text-light me-2">Привет, <strong>{{ user.username }}</strong>!</span>
                        <!-- Ссылка на список заказов пользователя -->
                        <a class="nav-link me-3" href="{% url 'order_list' %}">Мои заказы</a>
                        <a class="nav-link me-3" href="{% url 'logout' %}">Выйти</a>
                    {% else %}
                        <a class="nav-link" href="{% url 'login' %}">Войти</a>
                        <a class="nav-link me-2" href="{% url 'register' %}">Регистрация</a>
                    {% endif %}
                    <a class="nav-link btn btn-outline-light px-3" href="{% url 'cart_detail' %}">Корзина</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Футер -->
    <footer class="footer text-center text-muted">
        <div class="container">
            <p>&copy; 2026 Интернет-магазин учебных товаров</p>
        </div>
    </footer>

    <!-- Подключение Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
