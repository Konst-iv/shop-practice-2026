{% extends 'shop/base.html' %}

{% block title %}Заказ оформлен!{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="display-1 text-success mb-4">
        <i class="bi bi-check-circle">✓</i>
    </div>
    <h2 class="fw-bold text-dark">Спасибо за ваш заказ!</h2>
    <p class="lead text-muted mt-3">Ваш заказ <strong>№{{ order.id }}</strong> успешно создан.</p>
    <p class="text-muted">Мы свяжемся с вами в ближайшее время для подтверждения доставки.</p>
    
    <div class="mt-4">
        <a href="{% url 'order_list' %}" class="btn btn-primary btn-lg me-3">Мои заказы</a>
        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary btn-lg">Продолжить покупки</a>
    </div>
</div>
{% endblock %}
